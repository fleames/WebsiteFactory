<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Website Factory — Builder</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet" />
</head>
<body>
  <div id="root"></div>
  <script type="module" src="/src/main.tsx"></script>
  <script
    src="http://localhost:8080/chatbot.js"
    data-key="riftproxy"
    data-api="http://localhost:8080"
  ></script>
  <style>
    /* Force chatbot widget to bottom-left, above builder UI */
    [id*="riftproxy"], [class*="riftproxy"],
    [id*="chatbot"], [class*="chatbot"] {
      position: fixed !important;
      bottom: 1.5rem !important;
      left: 1.5rem !important;
      right: auto !important;
      z-index: 99999 !important;
    }
  </style>
</body>
</html>
